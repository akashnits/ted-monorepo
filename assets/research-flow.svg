<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Investment research request flow">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .note { font: 400 15px Arial, sans-serif; fill: #475569; }
      .step { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .decision { fill: #fff7ed; stroke: #f97316; stroke-width: 2; }
      .agent { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; rx: 14; }
      .label { font: 700 16px Arial, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
      .yesno { font: 700 13px Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#334155" />
    </marker>
  </defs>

  <rect class="bg" width="1280" height="640" />
  <text class="title" x="48" y="58">Investment Research Flow</text>
  <text class="note" x="48" y="86">Profile is used automatically when explicit. Portfolio is used only after confirmation.</text>

  <rect class="step" x="64" y="158" width="190" height="82" />
  <text class="label" x="86" y="190">User Message</text>
  <text class="small" x="86" y="214">"Should I buy TCS?"</text>

  <rect class="step" x="304" y="158" width="190" height="82" />
  <text class="label" x="326" y="190">Load Context</text>
  <text class="small" x="326" y="214">Profile, portfolio, session</text>

  <polygon class="decision" points="626,146 738,199 626,252 514,199" />
  <text class="label" x="574" y="194">Need portfolio?</text>
  <text class="small" x="585" y="216">Sensitive context</text>

  <rect class="step" x="834" y="78" width="230" height="90" />
  <text class="label" x="856" y="110">Ask Confirmation</text>
  <text class="small" x="856" y="134">Show relevant holdings</text>
  <text class="small" x="856" y="154">Confirm / without / cancel</text>

  <rect class="agent" x="834" y="254" width="230" height="90" />
  <text class="label" x="856" y="286">Run Hermes</text>
  <text class="small" x="856" y="310">Investment Research Skill</text>
  <text class="small" x="856" y="330">Tools + synthesis</text>

  <rect class="step" x="834" y="430" width="230" height="90" />
  <text class="label" x="856" y="462">Return Brief</text>
  <text class="small" x="856" y="486">30-45 sec evidence-backed</text>
  <text class="small" x="856" y="506">Save artifact if complete</text>

  <path class="arrow" d="M254 199 L294 199" />
  <path class="arrow" d="M494 199 L512 199" />
  <path class="arrow" d="M738 199 C780 199, 792 124, 824 124" />
  <text class="yesno" x="756" y="168">Yes</text>
  <path class="arrow" d="M626 252 C626 300, 782 300, 824 300" />
  <text class="yesno" x="650" y="286">No</text>
  <path class="arrow" d="M949 168 L949 244" />
  <text class="yesno" x="965" y="212">Confirmed</text>
  <path class="arrow" d="M949 344 L949 420" />

  <rect class="step" x="544" y="430" width="210" height="90" />
  <text class="label" x="566" y="462">Cancel or Clarify</text>
  <text class="small" x="566" y="486">No artifact saved</text>
  <text class="small" x="566" y="506">Ask only what is missing</text>

  <path class="arrow" d="M834 124 C720 124, 664 382, 678 420" />
  <text class="yesno" x="660" y="322">Cancel / unclear</text>
</svg>
